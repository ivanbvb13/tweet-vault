<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gestión de Categorías - Tweet Vault</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #fafafa;
      color: #000000;
      padding: 40px 20px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #000000;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 0.9375rem;
      color: #666666;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #666666;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 24px;
      transition: color 0.15s ease;
    }

    .back-link:hover {
      color: #000000;
    }

    .section {
      background: #ffffff;
      border: 1px solid #eaeaea;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: #000000;
      margin-bottom: 16px;
    }

    .category-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .category-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border: 1px solid #eaeaea;
      border-radius: 6px;
      transition: all 0.15s ease;
    }

    .category-item:hover {
      border-color: #000000;
    }

    .category-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .category-color {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 1px solid #eaeaea;
      cursor: pointer;
    }

    .category-name {
      font-size: 0.9375rem;
      font-weight: 500;
      color: #000000;
    }

    .category-default-badge {
      font-size: 0.75rem;
      color: #666666;
      background: #fafafa;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 8px;
    }

    .category-actions {
      display: flex;
      gap: 8px;
    }

    .btn-icon {
      background: transparent;
      border: 1px solid #eaeaea;
      color: #666666;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
      font-weight: 500;
    }

    .btn-icon:hover {
      border-color: #000000;
      color: #000000;
    }

    .btn-icon.danger:hover {
      border-color: #ef4444;
      color: #ef4444;
    }

    .btn-icon.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .add-category-form {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .input-group {
      flex: 1;
      display: flex;
      gap: 8px;
    }

    .input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d4d4d4;
      border-radius: 6px;
      font-size: 0.875rem;
      font-family: inherit;
      transition: all 0.15s ease;
    }

    .input:hover {
      border-color: #000000;
    }

    .input:focus {
      outline: none;
      border-color: #000000;
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.1);
    }

    .input-color {
      width: 60px;
      padding: 4px;
      cursor: pointer;
    }

    .btn {
      padding: 10px 20px;
      border: 1px solid;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
      white-space: nowrap;
    }

    .btn-primary {
      background: #000000;
      color: #ffffff;
      border-color: #000000;
    }

    .btn-primary:hover {
      background: #171717;
      border-color: #171717;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 0.875rem;
      margin-bottom: 20px;
      border: 1px solid;
    }

    .alert-success {
      background: #f0fdf4;
      color: #166534;
      border-color: #bbf7d0;
    }

    .alert-error {
      background: #fef2f2;
      color: #991b1b;
      border-color: #fecaca;
    }

    .alert.hidden {
      display: none;
    }

    .logout-section {
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid #eaeaea;
    }

    .btn-logout {
      padding: 10px 20px;
      border: 1px solid #ef4444;
      background: transparent;
      color: #ef4444;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
    }

    .btn-logout:hover {
      background: #fef2f2;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="../library/library.html" class="back-link">
      ← Volver a la biblioteca
    </a>

    <div class="header">
      <h1>Gestión de Categorías</h1>
      <p>Organiza tus tweets con categorías personalizadas</p>
    </div>

    <div id="alert" class="alert hidden"></div>

    <div class="section">
      <div class="section-title">Mis Categorías</div>
      <div class="category-list" id="category-list">
        <!-- Categorías se cargan dinámicamente -->
      </div>
    </div>

    <div class="section">
      <div class="section-title">Agregar Nueva Categoría</div>
      <form class="add-category-form" id="add-category-form">
        <div class="input-group">
          <input type="text" class="input" id="new-category-name" placeholder="Nombre de la categoría" maxlength="30" required>
          <input type="color" class="input input-color" id="new-category-color" value="#000000">
        </div>
        <button type="submit" class="btn btn-primary">Agregar</button>
      </form>
    </div>

    <div class="logout-section">
      <button class="btn-logout" id="btn-logout">Cerrar Sesión</button>
    </div>
  </div>

  <script type="module" src="settings.js"></script>
</body>
</html>
